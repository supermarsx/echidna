name: Release

# Release is called by the normal CI workflow after its gates pass on main.
# Direct pushed YY.N tags and manual `workflow_dispatch` releases are also
# supported for recovery or explicit release operations.
on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 26.1). Leave empty to auto-compute next YY.N."
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false
      allow_unsigned_skip:
        description: "Allow normal CI to skip publication when every signing secret is absent"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 26.1). Leave empty to auto-compute next YY.N."
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "[0-9][0-9].[1-9]*"

permissions:
  contents: write

concurrency:
  group: >-
    release-${{ github.workflow }}-${{ inputs.tag ||
    (startsWith(github.ref, 'refs/tags/') && github.ref) || 'auto' }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.signing.outputs.release_enabled }}
      tag: ${{ steps.resolve.outputs.tag }}
      tag_source: ${{ steps.resolve.outputs.source }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # An unconfigured repository may run normal CI without publishing. Only
      # that main-push path can skip; tag/manual releases and partial or invalid
      # signing configuration continue to fail closed.
      - name: Determine release signing readiness
        id: signing
        env:
          ALLOW_UNSIGNED_SKIP: ${{ inputs.allow_unsigned_skip || false }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_CERT_SHA256: ${{ secrets.RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          signing_args=()
          if [ "$ALLOW_UNSIGNED_SKIP" = "true" ]; then
            signing_args+=(--allow-unconfigured-skip)
          fi
          python3 tools/check_release_signing.py "${signing_args[@]}"

      # Resolve the release tag:
      #   - CI workflow_call from a main push still reports GITHUB_EVENT_NAME=push
      #     with GITHUB_REF=refs/heads/main -> auto-compute next YY.N, create the ref
      #   - tag push       -> use the pushed YY.N tag (never create)
      #   - workflow_dispatch with an input -> validate YY.N, create the ref if new
      #   - workflow_dispatch without input -> auto-compute next YY.N, create the ref
      - name: Resolve release tag
        id: resolve
        if: steps.signing.outputs.release_enabled == 'true'
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag || '' }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          git tag --list > "${RUNNER_TEMP}/release-tags.txt"
          python3 tools/resolve_release_tag.py \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --manual-tag "${RELEASE_TAG_INPUT}" \
            --tags-file "${RUNNER_TEMP}/release-tags.txt"

      - name: Set up JDK for release signing preflight
        if: steps.signing.outputs.release_enabled == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Importing the selected private-key entry validates the keystore bytes,
      # store password, alias, and key password before an automatic tag exists.
      - name: Validate release keystore credentials
        if: steps.signing.outputs.release_enabled == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::add-mask::${RELEASE_STORE_PASSWORD}"
          echo "::add-mask::${RELEASE_KEY_PASSWORD}"
          umask 077
          cleanup_preflight() {
            rm -f "$RUNNER_TEMP/release-preflight.jks" \
              "$RUNNER_TEMP/release-preflight.p12"
          }
          trap cleanup_preflight EXIT
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/release-preflight.jks"
          keytool -importkeystore -noprompt \
            -srckeystore "$RUNNER_TEMP/release-preflight.jks" \
            -srcstorepass "$RELEASE_STORE_PASSWORD" \
            -srcalias "$RELEASE_KEY_ALIAS" \
            -srckeypass "$RELEASE_KEY_PASSWORD" \
            -destkeystore "$RUNNER_TEMP/release-preflight.p12" \
            -deststoretype PKCS12 \
            -deststorepass echidna-preflight \
            -destkeypass echidna-preflight

      - name: Create tag if needed and reject duplicate releases
        if: steps.signing.outputs.release_enabled == 'true'
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
          RELEASE_TAG_SOURCE: ${{ steps.resolve.outputs.source }}
          RELEASE_SHOULD_CREATE_TAG: ${{ steps.resolve.outputs.should_create_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const source = process.env.RELEASE_TAG_SOURCE;
            const shouldCreateTag = process.env.RELEASE_SHOULD_CREATE_TAG === "true";
            const { owner, repo } = context.repo;

            let tagExists = false;
            try {
              const ref = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              tagExists = true;
              core.info(`Tag ${tag} exists at ${ref.data.object.sha}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (source === "push" && !tagExists) {
              core.setFailed(`Pushed tag ${tag} was not found through the refs API.`);
              return;
            }

            if (shouldCreateTag && tagExists) {
              core.setFailed(
                `Resolved tag ${tag} already exists before creation. ` +
                  "Re-run to compute the next YY.N tag."
              );
              return;
            }

            if (!shouldCreateTag && !tagExists) {
              core.setFailed(`Resolved tag ${tag} does not exist and creation was not requested.`);
              return;
            }

            if (shouldCreateTag) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag} at ${context.sha}.`);
            }

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.setFailed(
                `Release for tag ${tag} already exists: ${release.data.html_url}`
              );
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await core.summary
              .addHeading("Release tag")
              .addTable([
                [
                  { data: "Field", header: true },
                  { data: "Value", header: true },
                ],
                ["Resolved tag", tag],
                ["Source", source],
                ["Checkout ref", `refs/tags/${tag}`],
              ])
              .write();

      - name: Checkout resolved tag
        if: steps.signing.outputs.release_enabled == 'true'
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout --force "${{ steps.resolve.outputs.checkout_ref }}"

      - name: Generate changelog
        id: changelog
        if: steps.signing.outputs.release_enabled == 'true'
        run: |
          set -euo pipefail
          CURRENT="${{ steps.resolve.outputs.tag }}"
          # Most recent existing tag other than the one being released.
          PREV="$(git tag --sort=-creatordate | grep -vxF "$CURRENT" | head -n1 || true)"
          if [ -n "$PREV" ]; then
            echo "Changes since ${PREV}:" > changelog.md
            RANGE="${PREV}..HEAD"
          else
            echo "Initial release." > changelog.md
            RANGE="HEAD"
          fi
          echo "" >> changelog.md
          git log --no-merges --pretty=format:'- %s (%h)' ${RANGE} >> changelog.md || true
          echo "" >> changelog.md
          {
            echo "body<<CHANGELOG_EOF"
            cat changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  native:
    name: "Native per-ABI (NDK) + Magisk module"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.release_enabled == 'true'
    env:
      ECHIDNA_VERSION: ${{ needs.prepare.outputs.tag }}
      RELEASE_CERT_SHA256: ${{ secrets.RELEASE_CERT_SHA256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up JDK for trust helper
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android NDK r27
        run: |
          sdkmanager --install \
            "ndk;27.0.12077973" \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null

      - name: Install build tools (Ninja, zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build zip

      # Cross-compile the DSP, Zygisk module, and standalone LSPosed JNI bridge
      # for every supported ABI into build/<abi>/lib/.
      - name: Build native libraries (per-ABI NDK)
        run: |
          set -euo pipefail
          export ANDROID_NDK="${ANDROID_SDK_ROOT}/ndk/27.0.12077973"
          ANDROID_PLATFORM=android-26 bash tools/build_native_ndk.sh

      - name: Build API26-compatible app_process trust helper
        run: bash tools/build_trust_helper.sh

      # Packages the per-ABI engine (zygisk/<abi>.so) + DSP libs into a flashable
      # Magisk zip at out/echidna-magisk.zip (tools/build_magisk_module.sh, t2-e14).
      - name: Build flashable Magisk module
        run: bash tools/build_magisk_module.sh

      - name: Verify Magisk module and legacy effect payloads
        run: >-
          python3 tools/verify_magisk_module.py
          --zip out/echidna-magisk.zip
          --build-root build

      - name: Collect native release packages
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.tag }}"
          mkdir -p artifacts/native/package/native-libs artifacts/android-runtime-libs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "artifacts/native/package/native-libs/${abi}"
            mkdir -p "artifacts/android-runtime-libs/${abi}/lib"
            cp "build/${abi}/lib/libech_dsp.so" \
              "artifacts/native/package/native-libs/${abi}/libech_dsp.so"
            cp "build/${abi}/lib/libechidna.so" \
              "artifacts/native/package/native-libs/${abi}/libechidna.so"
            cp "build/${abi}/lib/libechidna_shim_jni.so" \
              "artifacts/native/package/native-libs/${abi}/libechidna_shim_jni.so"
            cp "build/${abi}/lib/libechidna_preproc.so" \
              "artifacts/native/package/native-libs/${abi}/libechidna_preproc.so"
            cp "build/${abi}/lib/libech_dsp.so" \
              "artifacts/android-runtime-libs/${abi}/lib/libech_dsp.so"
            cp "build/${abi}/lib/libechidna_shim_jni.so" \
              "artifacts/android-runtime-libs/${abi}/lib/libechidna_shim_jni.so"
          done
          cat > artifacts/native/package/README.md <<EOF
          # Echidna native libraries ${VERSION}

          This package contains the raw Android NDK outputs for each supported ABI:

          - libechidna.so: Zygisk/native hook engine
          - libech_dsp.so: DSP engine library
          - libechidna_shim_jni.so: standalone LSPosed AudioRecord JNI bridge
          - libechidna_preproc.so: default-off legacy input-effect library packaged by Magisk

          End users normally install echidna-magisk-${VERSION}.zip instead. These
          raw libraries are attached for inspection, debugging, and integrators.
          EOF
          (
            cd artifacts/native/package
            zip -r -X "../echidna-native-libs-${VERSION}.zip" .
          )
          mkdir -p artifacts/magisk
          cp out/echidna-magisk.zip "artifacts/magisk/echidna-magisk-${VERSION}.zip"

      - name: Upload native libraries package
        uses: actions/upload-artifact@v7
        with:
          name: native-libs
          path: artifacts/native/echidna-native-libs-*.zip

      - name: Upload Magisk module
        uses: actions/upload-artifact@v7
        with:
          name: magisk
          path: artifacts/magisk/echidna-magisk-*.zip

      - name: Upload LSPosed native runtime inputs
        uses: actions/upload-artifact@v7
        with:
          name: android-runtime-libs
          path: artifacts/android-runtime-libs
          retention-days: 1

  android:
    name: "Signed release APKs"
    runs-on: ubuntu-latest
    needs: [prepare, native]
    if: needs.prepare.outputs.release_enabled == 'true'
    env:
      ECHIDNA_VERSION: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download per-ABI LSPosed native runtime
        uses: actions/download-artifact@v8
        with:
          name: android-runtime-libs
          path: build

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install APK verification build tools
        run: sdkmanager --install "build-tools;34.0.0" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.5"

      - name: Generate local.properties for Android projects
        run: |
          set -euo pipefail
          for dir in android/app android/control-service android/lsposed-shim; do
            echo "sdk.dir=${ANDROID_SDK_ROOT}" > "$dir/local.properties"
          done

      # The prepare job already rejected missing/partial signing inputs before
      # tag creation. Materialize the required keystore without echoing it.
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          test -s "$RUNNER_TEMP/release.jks"
          chmod 0600 "$RUNNER_TEMP/release.jks"

      - name: Build signed release APKs
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::add-mask::${RELEASE_STORE_PASSWORD}"
          echo "::add-mask::${RELEASE_KEY_PASSWORD}"
          echo "Building publishable APKs with the configured release keystore."
          gradle --project-dir android/app :app:assembleRelease
          gradle --project-dir android/lsposed-shim :shim:assembleRelease

      - name: Collect Android release packages
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.tag }}"
          mkdir -p artifacts/android/package/apks
          cp android/app/app/build/outputs/apk/release/app-release.apk \
            "artifacts/android/package/apks/echidna-companion-${VERSION}.apk"
          cp android/lsposed-shim/shim/build/outputs/apk/release/shim-release.apk \
            "artifacts/android/package/apks/echidna-lsposed-shim-${VERSION}.apk"
          cat > artifacts/android/package/README.md <<EOF
          # Echidna APKs ${VERSION}

          - echidna-companion-${VERSION}.apk: companion app and in-process control service.
          - echidna-lsposed-shim-${VERSION}.apk: installable LSPosed/Xposed Java fallback shim.

          Both APKs are signed with the configured release key. The release workflow fails
          closed before tag creation when any required signing secret is missing.
          EOF
          (
            cd artifacts/android/package
            zip -r -X "../echidna-apks-${VERSION}.zip" .
          )
          cp artifacts/android/package/apks/*.apk artifacts/android/

      - name: Verify APK payloads, signing, and bundle provenance
        env:
          RELEASE_CERT_SHA256: ${{ secrets.RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.tag }}"
          python3 tools/verify_android_artifacts.py \
            --companion "artifacts/android/echidna-companion-${VERSION}.apk" \
            --shim "artifacts/android/echidna-lsposed-shim-${VERSION}.apk" \
            --apks-bundle "artifacts/android/echidna-apks-${VERSION}.zip" \
            --apksigner "${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner" \
            --require-release-signing

      - name: Remove temporary release keystore
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: |
            artifacts/android/echidna-companion-*.apk
            artifacts/android/echidna-lsposed-shim-*.apk
            artifacts/android/echidna-apks-*.zip

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, native, android]
    # Defense in depth: publish only for the supported release entry points.
    if: >-
      needs.prepare.outputs.release_enabled == 'true' &&
      (github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch')
    steps:
      - name: Download native library package
        uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: release_artifacts/native-libs

      - name: Download Magisk package
        uses: actions/download-artifact@v8
        with:
          name: magisk
          path: release_artifacts/magisk

      - name: Download verified Android packages
        uses: actions/download-artifact@v8
        with:
          name: android-apks
          path: release_artifacts/android-apks

      - name: Prepare release asset set
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.tag }}"
          mkdir -p release_upload
          find release_artifacts -type f -print0 | sort -z | while IFS= read -r -d '' file; do
            cp "${file}" release_upload/
          done
          cd release_upload
          expected=(
            "echidna-companion-${VERSION}.apk"
            "echidna-lsposed-shim-${VERSION}.apk"
            "echidna-apks-${VERSION}.zip"
            "echidna-magisk-${VERSION}.zip"
            "echidna-native-libs-${VERSION}.zip"
          )
          for file in "${expected[@]}"; do
            test -f "${file}" || {
              echo "missing release asset: ${file}" >&2
              exit 1
            }
          done
          cat > RELEASE_ARTIFACTS.md <<EOF
          # Echidna ${VERSION} release artifacts

          ## Installable packages

          - echidna-companion-${VERSION}.apk: companion app and in-process control service.
          - echidna-magisk-${VERSION}.zip: flashable Magisk/Zygisk native engine module.
          - echidna-lsposed-shim-${VERSION}.apk: optional LSPosed Java fallback shim.

          ## Convenience packages

          - echidna-apks-${VERSION}.zip: companion APK plus LSPosed shim APK.
          - echidna-native-libs-${VERSION}.zip: raw per-ABI Zygisk, DSP, and shim JNI libraries.
          - echidna-complete-${VERSION}.zip: all release assets above plus this manifest.

          Use the newest release unless you are intentionally rolling back or already
          understand the recovery procedure. Earlier releases may contain boot/module bugs
          fixed later and can be harder to recover from after flashing.

          Install the Magisk/Zygisk module and companion APK for the native path. Install
          the LSPosed shim only when validating or using the Java fallback path. Avoid
          scoping the same target app into both Zygisk and LSPosed unless explicitly testing
          duplicate-hook behavior.
          EOF
          zip -r -X "echidna-complete-${VERSION}.zip" \
            "echidna-companion-${VERSION}.apk" \
            "echidna-lsposed-shim-${VERSION}.apk" \
            "echidna-apks-${VERSION}.zip" \
            "echidna-magisk-${VERSION}.zip" \
            "echidna-native-libs-${VERSION}.zip" \
            "RELEASE_ARTIFACTS.md"
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Echidna ${{ needs.prepare.outputs.tag }}
          body: ${{ needs.prepare.outputs.changelog }}
          prerelease: ${{ inputs.prerelease || false }}
          files: release_upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
